<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TeamZone — Global Team Availability</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161b22; --panel-2:#1c2230; --line:#2a3140;
    --text:#e6edf3; --muted:#8b97a8; --accent:#4f9dff; --accent-2:#6c7cff;
    --green:#34d399; --amber:#fbbf24; --sleep:#5b6b8c; --red:#f87171;
    --radius:14px; --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, #1a2230 0%, var(--bg) 55%);
    color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit;color:var(--text)}

  header{
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    padding:16px 22px;border-bottom:1px solid var(--line);
    background:rgba(14,17,23,.7);backdrop-filter:blur(8px);
    position:sticky;top:0;z-index:30;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:17px;letter-spacing:.2px}
  .brand .globe{width:26px;height:26px;border-radius:50%;
    background:conic-gradient(from 200deg,#4f9dff,#6c7cff,#34d399,#4f9dff);
    box-shadow:0 0 14px rgba(79,157,255,.5)}
  .myclock{margin-left:2px;color:var(--muted);font-variant-numeric:tabular-nums}
  .myclock b{color:var(--text);font-weight:600}

  .tabs{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;gap:2px}
  .tabs button{
    border:0;background:transparent;color:var(--muted);
    padding:7px 14px;border-radius:9px;font-weight:600;font-size:13px;transition:.15s;
  }
  .tabs button.active{background:var(--accent);color:#06121f;box-shadow:0 2px 8px rgba(79,157,255,.4)}
  .tabs button:not(.active):hover{color:var(--text)}

  .spacer{flex:1}
  .btn{
    border:1px solid var(--line);background:var(--panel);color:var(--text);
    padding:8px 14px;border-radius:10px;font-weight:600;font-size:13px;transition:.15s;
    display:inline-flex;align-items:center;gap:7px;
  }
  .btn:hover{border-color:var(--accent);background:var(--panel-2)}
  .btn.primary{background:var(--accent);color:#06121f;border-color:transparent}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent}

  /* Scrubber */
  .scrub{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:12px 22px;border-bottom:1px solid var(--line);
    background:var(--panel);
  }
  .scrub .lab{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px;font-weight:700}
  .scrub input[type=range]{flex:1;min-width:200px;accent-color:var(--accent);height:4px}
  .scrub .val{font-variant-numeric:tabular-nums;font-weight:700;min-width:230px}
  .scrub .val.live{color:var(--green)}
  .scrub .val.preview{color:var(--amber)}
  .scrub select{
    background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-size:13px;
  }

  main{padding:22px;max-width:1300px;margin:0 auto}

  /* NOW grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .card{
    background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 140%);
    border:1px solid var(--line);border-radius:var(--radius);padding:16px;
    position:relative;overflow:hidden;transition:.15s;
  }
  .card:hover{border-color:#3a4456;transform:translateY(-2px);box-shadow:var(--shadow)}
  .card .statusbar{position:absolute;left:0;top:0;bottom:0;width:5px}
  .card .top{display:flex;align-items:center;gap:12px}
  .avatar{
    width:44px;height:44px;border-radius:12px;flex:none;display:grid;place-items:center;
    font-weight:700;font-size:16px;color:#06121f;
  }
  .who{min-width:0}
  .who .name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .who .role{color:var(--muted);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .time{display:flex;align-items:baseline;gap:9px;margin:14px 0 4px}
  .card .time .hhmm{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.5px}
  .card .time .ampm{color:var(--muted);font-weight:600}
  .card .meta{color:var(--muted);font-size:12.5px;display:flex;justify-content:space-between;gap:8px}
  .card .daydiff{font-size:11px;font-weight:700;padding:1px 7px;border-radius:20px;background:#2a3140;color:var(--amber)}
  .badge{
    display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
    padding:4px 10px;border-radius:20px;margin-top:12px;
  }
  .badge .dot{width:8px;height:8px;border-radius:50%}
  .b-work{background:rgba(52,211,153,.13);color:var(--green)}
  .b-awake{background:rgba(251,191,36,.13);color:var(--amber)}
  .b-sleep{background:rgba(91,107,140,.18);color:#9fb0d0}
  .card .acts{position:absolute;top:12px;right:12px;display:flex;gap:6px;opacity:0;transition:.15s}
  .card:hover .acts{opacity:1}
  .iconbtn{width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:rgba(0,0,0,.25);
    color:var(--muted);display:grid;place-items:center;font-size:13px}
  .iconbtn:hover{color:var(--text);border-color:var(--accent)}

  .empty{
    text-align:center;padding:70px 20px;color:var(--muted);
    border:1.5px dashed var(--line);border-radius:var(--radius);
  }
  .empty h3{color:var(--text);margin:8px 0}

  /* Sub-tabs for calendar */
  .subtabs{display:inline-flex;gap:6px;margin-bottom:18px}
  .subtabs button{border:1px solid var(--line);background:var(--panel);color:var(--muted);
    padding:6px 13px;border-radius:9px;font-weight:600;font-size:12.5px}
  .subtabs button.active{color:var(--text);border-color:var(--accent);background:var(--panel-2)}

  /* Daily timeline */
  .tl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:6px 0;overflow:hidden}
  .tl-axis{display:grid;grid-template-columns:200px 1fr;align-items:center;padding:8px 16px 4px;color:var(--muted);font-size:11px}
  .tl-hours{position:relative;height:18px}
  .tl-hours span{position:absolute;transform:translateX(-50%);font-variant-numeric:tabular-nums}
  .tl-row{display:grid;grid-template-columns:200px 1fr;align-items:center;border-top:1px solid var(--line);padding:9px 16px}
  .tl-row .lbl{display:flex;align-items:center;gap:9px;min-width:0}
  .tl-row .lbl .nm{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tl-row .lbl .lt{color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums;margin-left:auto;padding-left:8px}
  .track{position:relative;height:26px;background:repeating-linear-gradient(90deg,#10151e 0,#10151e calc(100%/24 - 1px),#1b2230 calc(100%/24 - 1px),#1b2230 calc(100%/24));border-radius:7px;overflow:hidden}
  .band{position:absolute;top:0;bottom:0;border-radius:6px;background:linear-gradient(180deg,rgba(52,211,153,.55),rgba(52,211,153,.30));border:1px solid rgba(52,211,153,.6)}
  .band.awake{background:linear-gradient(180deg,rgba(251,191,36,.30),rgba(251,191,36,.15));border-color:rgba(251,191,36,.45)}
  .nowline{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--red);z-index:5;box-shadow:0 0 8px var(--red)}
  .nowline::before{content:'';position:absolute;top:-3px;left:-3px;width:8px;height:8px;border-radius:50%;background:var(--red)}

  /* Weekly heatmap */
  .heat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;overflow-x:auto}
  table.hm{border-collapse:collapse;width:100%;min-width:560px}
  table.hm th{color:var(--muted);font-size:11px;font-weight:700;padding:4px;text-align:center}
  table.hm td.h{color:var(--muted);font-size:11px;text-align:right;padding-right:8px;font-variant-numeric:tabular-nums;white-space:nowrap}
  table.hm td.cell{width:13%;height:17px;border:1px solid var(--bg);border-radius:3px;text-align:center;font-size:10px;color:#06121f;font-weight:700;cursor:default}
  .hm-legend{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;margin-top:14px}
  .hm-legend .sw{width:18px;height:12px;border-radius:3px}

  /* Map */
  .map-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px;position:relative}
  #map{width:100%;height:auto;display:block;border-radius:10px;background:#0b1426}
  .map-legend{display:flex;gap:18px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:12px;padding:0 4px}
  .map-legend span{display:inline-flex;align-items:center;gap:6px}
  .map-legend .dot{width:10px;height:10px;border-radius:50%}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(4,7,12,.66);backdrop-filter:blur(3px);z-index:50;display:none;place-items:center;padding:20px}
  .overlay.show{display:grid}
  .modal{width:min(520px,100%);background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);max-height:90vh;overflow:auto}
  .modal h2{margin:0;padding:20px 22px;border-bottom:1px solid var(--line);font-size:17px}
  .modal .body{padding:20px 22px;display:grid;gap:16px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .field input,.field select{
    width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;font-size:14px;outline:none;
  }
  .field input:focus,.field select:focus{border-color:var(--accent)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .hint{color:var(--muted);font-size:11.5px;margin-top:5px}
  .hint b{color:var(--accent)}
  .tz-quick{display:flex;gap:8px;align-items:flex-end}
  .tz-quick .field{flex:1}
  .days{display:flex;gap:5px;flex-wrap:wrap}
  .days button{border:1px solid var(--line);background:var(--panel-2);color:var(--muted);border-radius:8px;width:42px;padding:7px 0;font-weight:700;font-size:12px}
  .days button.on{background:var(--accent);color:#06121f;border-color:transparent}
  .modal .foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
  .modal .foot .del{margin-right:auto}
  .danger{color:var(--red);border-color:rgba(248,113,113,.4)}
  .danger:hover{background:rgba(248,113,113,.12)}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--panel-2);border:1px solid var(--line);padding:10px 18px;border-radius:12px;
    box-shadow:var(--shadow);opacity:0;transition:.25s;z-index:60;font-weight:600}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:560px){
    .tl-axis,.tl-row{grid-template-columns:130px 1fr}
    .scrub .val{min-width:0}
  }
</style>
</head>
<body>
<header>
  <div class="brand"><div class="globe"></div> TeamZone</div>
  <div class="myclock" id="myclock"></div>
  <div class="tabs" id="tabs">
    <button data-view="now" class="active">Now</button>
    <button data-view="calendar">Calendar</button>
    <button data-view="map">Map</button>
  </div>
  <div class="spacer"></div>
  <button class="btn ghost" id="importBtn" title="Import JSON">Import</button>
  <button class="btn ghost" id="exportBtn" title="Export JSON">Export</button>
  <button class="btn primary" id="addBtn">+ Add member</button>
  <input type="file" id="fileInput" accept="application/json" style="display:none" />
</header>

<div class="scrub">
  <span class="lab">Time</span>
  <input type="range" id="scrubRange" min="-720" max="720" step="15" value="0" />
  <div class="val live" id="scrubVal">Live — now</div>
  <button class="btn ghost" id="resetScrub" style="display:none">Reset to now</button>
  <span class="lab" style="margin-left:6px">Reference</span>
  <select id="refTz"></select>
</div>

<main id="main"></main>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Add member</h2>
    <div class="body">
      <div class="row2">
        <div class="field"><label>Name</label><input id="fName" placeholder="e.g. Priya Sharma" /></div>
        <div class="field"><label>Role</label><input id="fRole" placeholder="e.g. Backend Engineer" /></div>
      </div>
      <div class="field">
        <label>Timezone</label>
        <input id="fTz" list="tzlist" placeholder="Search… e.g. Asia/Tokyo" autocomplete="off" />
        <datalist id="tzlist"></datalist>
        <div class="hint" id="tzPreview"></div>
      </div>
      <div class="tz-quick">
        <div class="field">
          <label>…or set by their current time</label>
          <input id="fCurTime" placeholder="HH:MM (24h), e.g. 15:45" autocomplete="off" />
        </div>
        <button class="btn" id="findTzBtn" type="button">Find zone</button>
      </div>
      <div class="row2">
        <div class="field"><label>Work starts</label>
          <select id="fStart"></select></div>
        <div class="field"><label>Work ends</label>
          <select id="fEnd"></select></div>
      </div>
      <div class="field">
        <label>Work days</label>
        <div class="days" id="fDays"></div>
      </div>
    </div>
    <div class="foot">
      <button class="btn danger del" id="deleteBtn" style="display:none">Delete</button>
      <button class="btn ghost" id="cancelBtn">Cancel</button>
      <button class="btn primary" id="saveBtn">Save member</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================ State & storage ============================ */
const STORE_KEY = 'teamzone.members.v1';
const VIEW_KEY  = 'teamzone.view.v1';
const palette = ['#4f9dff','#6c7cff','#34d399','#fbbf24','#f87171','#f472b6','#22d3ee','#a78bfa','#fb923c','#4ade80'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let members = load();
let view = localStorage.getItem(VIEW_KEY) || 'now';
let calMode = 'daily';
let scrubOffsetMin = 0;          // minutes offset from real now (the scrubber)
let editingId = null;
let refTz = localStorage.getItem('teamzone.reftz') || guessLocalTz();

function load(){
  try{
    const raw = JSON.parse(localStorage.getItem(STORE_KEY));
    if(Array.isArray(raw) && raw.length) return raw;
  }catch(e){}
  return seed();
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(members)); }
function seed(){
  const mk=(name,role,tz,s,e)=>({id:uid(),name,role,tz,workStart:s,workEnd:e,days:[1,2,3,4,5],color:colorFor(name)});
  return [
    mk('You','Team Lead', guessLocalTz(), 9, 17),
    mk('Priya Sharma','Backend Engineer','Asia/Kolkata',10,18),
    mk('Diego Morales','Designer','America/Mexico_City',9,17),
    mk('Lena Fischer','PM','Europe/Berlin',9,17),
    mk('Kenji Tanaka','Mobile Dev','Asia/Tokyo',9,18),
  ];
}
function uid(){ return 'm'+Math.abs(hashStr(Math.random()+''+performance.now())).toString(36); }
function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=(h<<5)-h+s.charCodeAt(i);h|=0;}return h;}
function colorFor(name){ return palette[Math.abs(hashStr(name))%palette.length]; }
function initials(name){
  const p=name.trim().split(/\s+/);
  return ((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase()||'?';
}

/* ============================ Time helpers ============================ */
function guessLocalTz(){
  try{ return Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC'; }catch(e){ return 'UTC'; }
}
function evalDate(){ return new Date(Date.now() + scrubOffsetMin*60000); }

// Offset (minutes) of a timezone from UTC at a given instant.
const _offCache = new Map();
function tzOffsetMin(tz, date){
  const key = tz+'|'+Math.floor(date.getTime()/3600000); // hour granularity cache
  if(_offCache.has(key)) return _offCache.get(key);
  let val;
  try{
    const dtf = new Intl.DateTimeFormat('en-US',{timeZone:tz,hour12:false,
      year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const p={}; for(const part of dtf.formatToParts(date)) p[part.type]=part.value;
    let hh = p.hour==='24'?0:+p.hour;
    const asUTC = Date.UTC(+p.year,+p.month-1,+p.day,hh,+p.minute,+p.second);
    val = Math.round((asUTC - date.getTime())/60000);
  }catch(e){ val = 0; }
  _offCache.set(key,val);
  return val;
}
// Parts of an instant rendered in a timezone.
function tzParts(tz,date){
  const dtf = new Intl.DateTimeFormat('en-US',{timeZone:tz,hour12:false,weekday:'short',
    year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  const p={}; for(const part of dtf.formatToParts(date)) p[part.type]=part.value;
  let hh = p.hour==='24'?0:+p.hour;
  return {weekday:p.weekday,wd:DAYS.indexOf(p.weekday),y:+p.year,mo:+p.month,d:+p.day,h:hh,mi:+p.minute,
          dateStr:`${p.weekday} ${p.month}/${p.day}`};
}
function fmtTime(tz,date){
  const p=tzParts(tz,date);
  const ampm=p.h<12?'AM':'PM'; let h12=p.h%12; if(h12===0)h12=12;
  return {hhmm:`${String(p.h).padStart(2,'0')}:${String(p.mi).padStart(2,'0')}`,
          h12:`${h12}:${String(p.mi).padStart(2,'0')}`, ampm, parts:p};
}

// status: 'work' | 'awake' | 'sleep'
function statusOf(m,date){
  const p=tzParts(m.tz,date);
  const hour = p.h + p.mi/60;
  const onDay = m.days.includes(p.wd);
  if(onDay && hour>=m.workStart && hour<m.workEnd) return 'work';
  if(hour>=7 && hour<23) return 'awake';
  return 'sleep';
}
const STATUS_META = {
  work:{label:'Working',cls:'b-work',color:'var(--green)',rank:0},
  awake:{label:'Awake / off-hours',cls:'b-awake',color:'var(--amber)',rank:1},
  sleep:{label:'Asleep',cls:'b-sleep',color:'var(--sleep)',rank:2},
};

 'Asia/Kathmandu':[27.7,85.3],'Asia/Yangon':[16.8,96.2],'Asia/Bangkok':[13.7,100.5],

function coordsFor(m,date){
  if(CITY[m.tz]) return CITY[m.tz];
  const lon = (tzOffsetMin(m.tz,date)/60)*15;
  // spread unknown zones a little vertically using a name hash so pins don't stack
  const lat = ((Math.abs(hashStr(m.tz))%60)-30);
  return [lat, Math.max(-179,Math.min(179,lon))];
}

function renderScrub(){

function fmtOffset(min){const s=min<0?'−':'+';const a=Math.abs(min);return `UTC${s}${String(Math.floor(a/60)).padStart(2,'0')}:${String(a%60).padStart(2,'0')}`;}
function fmtHour(h){const ap=h<12?'am':'pm';let x=h%12;if(x===0)x=12;return x+ap;}

function renderDaily(){
  const d=evalDate();
  const refOff=tzOffsetMin(refTz,d);
  // hour axis labels
  let axis=''; for(let h=0;h<=24;h+=3){ axis+=`<span style="left:${h/24*100}%">${String(h%24).padStart(2,'0')}</span>`; }
  const nowFrac = (()=>{ const p=tzParts(refTz,d); return (p.h+p.mi/60)/24; })();
  const sorted=[...members].sort((a,b)=>tzOffsetMin(b.tz,d)-tzOffsetMin(a.tz,d));
  const rows = sorted.map(m=>{
    const off=tzOffsetMin(m.tz,d); const delta=(refOff-off)/60; // member-local hour + delta = ref hour
    const f=fmtTime(m.tz,d); const st=statusOf(m,d);
    const workBands = bandsToRef(m.workStart,m.workEnd,delta).map(b=>
      `<div class="band" style="left:${b[0]/24*100}%;width:${(b[1]-b[0])/24*100}%"></div>`).join('');
    const awakeBands = bandsToRef(7,23,delta).map(b=>
      `<div class="band awake" style="left:${b[0]/24*100}%;width:${(b[1]-b[0])/24*100}%;z-index:0"></div>`).join('');
    return `<div class="tl-row">
      <div class="lbl">
        <span class="dot" style="width:9px;height:9px;border-radius:50%;background:${STATUS_META[st].color}"></span>
        <span class="nm">${esc(m.name)}</span>
        <span class="lt">${f.hhmm}</span>
      </div>
      <div class="track">${awakeBands}${workBands}<div class="nowline" style="left:${nowFrac*100}%"></div></div>
    </div>`;
  }).join('');
  document.getElementById('calBody').innerHTML = `
    <div class="tl-wrap">
      <div class="tl-axis"><div>Member · local time</div><div class="tl-hours">${axis}</div></div>
      ${rows}
    </div>
    <div class="hm-legend">
      <span><span class="sw" style="background:rgba(52,211,153,.5)"></span> Working hours</span>
      <span><span class="sw" style="background:rgba(251,191,36,.3)"></span> Awake</span>
      <span><span class="sw" style="background:var(--red);width:3px"></span> ${scrubOffsetMin?'Preview time':'Now'}</span>
      <span style="margin-left:auto">Columns = hours in <b style="color:var(--text)">${esc(shortTz(refTz))}</b> time</span>
    </div>`;
}
// Map a [start,end) window in member-local hours to reference hours, splitting across midnight.
function bandsToRef(start,end,deltaHours){
  let s=(start+deltaHours), e=(end+deltaHours);
  // normalize so s in [0,24)
  while(s<0){s+=24;e+=24;} while(s>=24){s-=24;e-=24;}
  const out=[];
  if(e<=24){ out.push([s,e]); }
  else { out.push([s,24]); out.push([0,e-24]); }
  return out.filter(b=>b[1]>b[0]);
}

function renderWeekly(){
  const d=evalDate();
  const refOff=tzOffsetMin(refTz,d);
  const refP=tzParts(refTz,d);
  // Monday of current ref week
  const todayWd=refP.wd; const back=(todayWd+6)%7; // days since Monday
  // counts[hour][dayIndex] = {count, names[]}
  const grid=[];
  for(let h=0;h<24;h++){ grid[h]=[]; for(let di=0;di<7;di++) grid[h][di]={c:0,names:[]}; }
  const dayLabels=[];
  for(let di=0;di<7;di++){
    // calendar date of this weekday (Mon..Sun) in ref tz
    const dayShift = di-back; // relative to today
    // build a base UTC ms for that ref day at 00:00
    for(let h=0;h<24;h++){
      // ref wall time: (today date + dayShift) at h:00 → utc instant
      const baseUTC = Date.UTC(refP.y,refP.mo-1,refP.d+dayShift,h,0) - refOff*60000;
      members.forEach(m=>{
        const moff=tzOffsetMin(m.tz,new Date(baseUTC));
        const localMs=baseUTC+moff*60000; const ld=new Date(localMs);
        const lwd=ld.getUTCDay(); const lh=ld.getUTCHours()+ld.getUTCMinutes()/60;
        if(m.days.includes(lwd) && lh>=m.workStart && lh<m.workEnd){
          grid[h][di].c++; grid[h][di].names.push(m.name);
        }
      });
    }
    const lblDate=new Date(Date.UTC(refP.y,refP.mo-1,refP.d+dayShift));
    dayLabels.push({d:DAYS[(1+di)%7], num:lblDate.getUTCDate(), today: dayShift===0});
  }
  const maxC=members.length||1;
  let html='<div class="heat"><table class="hm"><thead><tr><th></th>';
  dayLabels.forEach(l=>html+=`<th>${l.d}<br><span style="color:${l.today?'var(--accent)':'var(--muted)'};font-size:10px">${l.num}</span></th>`);
  html+='</tr></thead><tbody>';
  for(let h=0;h<24;h++){
    // show every row but lighten labels for off hours
    html+=`<tr><td class="h">${String(h).padStart(2,'0')}:00</td>`;
    for(let di=0;di<7;di++){
      const cell=grid[h][di]; const ratio=cell.c/maxC;
      const bg=ratio===0?'#10151e':`rgba(52,211,153,${0.15+ratio*0.8})`;
      const txt=cell.c>0?cell.c:'';
      const title=cell.c>0?` title="${esc(cell.names.join(', '))}"`:'';
      html+=`<td class="cell"${title} style="background:${bg};color:${ratio>0.45?'#06121f':'#7d8aa0'}">${txt}</td>`;
    }
    html+='</tr>';
  }
  html+='</tbody></table>';
  html+=`<div class="hm-legend">
    <span>Fewer</span>
    <span class="sw" style="background:rgba(52,211,153,.2)"></span>
    <span class="sw" style="background:rgba(52,211,153,.5)"></span>
    <span class="sw" style="background:rgba(52,211,153,.95)"></span>
    <span>More people working</span>
    <span style="margin-left:auto">Hours & days in <b style="color:var(--text)">${esc(shortTz(refTz))}</b> · number = teammates available · hover for names</span>
  </div></div>`;
  document.getElementById('calBody').innerHTML=html;
}

function renderMap(){
  const W=1000,H=500;
  main.innerHTML = `<div class="map-wrap">
    <svg id="map" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="oceanG" cx="50%" cy="35%" r="80%">
          <stop offset="0%" stop-color="#13243f"/><stop offset="100%" stop-color="#0b1426"/>
        </radialGradient>
      </defs>
      <rect width="${W}" height="${H}" fill="url(#oceanG)"/>
      <image href="https://upload.wikimedia.org/wikipedia/commons/8/83/Equirectangular_projection_SW.jpg"
             x="0" y="0" width="${W}" height="${H}" preserveAspectRatio="none" opacity="0.55"/>
      <g id="graticule"></g>
      <path id="night" fill="rgba(8,12,30,0.55)" stroke="rgba(120,140,200,.25)" stroke-width="1"/>
      <circle id="sun" r="7" fill="#ffd66b" stroke="#fff3c4" stroke-width="2"/>
      <g id="pins"></g>
    </svg>
    <div class="map-legend">
      <span><span class="dot" style="background:var(--green)"></span> Working</span>
      <span><span class="dot" style="background:var(--amber)"></span> Awake</span>
      <span><span class="dot" style="background:var(--sleep)"></span> Asleep</span>
      <span style="margin-left:auto">🌙 shaded = night right now · ☀ = where it's solar noon</span>
    </div>
  </div>`;
  drawMap(W,H);
}
function drawMap(W,H){
  const d=evalDate();
  const X=lon=>(lon+180)/360*W, Y=lat=>(90-lat)/180*H;
  // graticule
  let g=''; for(let lon=-150;lon<=150;lon+=30) g+=`<line x1="${X(lon)}" y1="0" x2="${X(lon)}" y2="${H}" stroke="rgba(120,140,200,.10)"/>`;
  for(let lat=-60;lat<=60;lat+=30) g+=`<line x1="0" y1="${Y(lat)}" x2="${W}" y2="${Y(lat)}" stroke="rgba(120,140,200,.10)"/>`;
  document.getElementById('graticule').innerHTML=g;

  // day/night terminator
  const t=d.getTime();
  const dayMs=t - Date.UTC(d.getUTCFullYear(),0,0);
  const dayOfYear=Math.floor(dayMs/86400000);
  let decl=23.44*Math.sin((2*Math.PI/365)*(dayOfYear-81)*1)*1; // approx declination deg
  decl=23.44*Math.sin(2*Math.PI*(dayOfYear-81)/365);
  if(Math.abs(decl)<0.6) decl=decl<0?-0.6:0.6;
  const utcFrac=((d.getUTCHours()*3600+d.getUTCMinutes()*60+d.getUTCSeconds())/86400);
  let subLon=180-utcFrac*360; while(subLon<-180)subLon+=360; while(subLon>180)subLon-=360;
  const rad=Math.PI/180;
  const termLat=lon=>Math.atan(-Math.cos((lon-subLon)*rad)/Math.tan(decl*rad))/rad;
  let pts=[];
  for(let lon=-180;lon<=180;lon+=2) pts.push(`${X(lon).toFixed(1)},${Y(termLat(lon)).toFixed(1)}`);
  // close toward dark pole
  if(decl>0){ pts.push(`${W},${H}`,`0,${H}`); } else { pts.push(`${W},0`,`0,0`); }
  document.getElementById('night').setAttribute('d','M'+pts.join('L')+'Z');
  const sun=document.getElementById('sun'); sun.setAttribute('cx',X(subLon)); sun.setAttribute('cy',Y(decl));

  // pins
  let pins='';
  // small de-overlap: nudge pins sharing close coords
  const placed=[];
  members.forEach(m=>{
    let [lat,lon]=coordsFor(m,d); let x=X(lon),y=Y(lat);
    let tries=0;
    while(placed.some(p=>Math.abs(p.x-x)<14 && Math.abs(p.y-y)<14) && tries<8){ y-=15; tries++; }
    placed.push({x,y});
    const st=statusOf(m,d); const col=STATUS_META[st].color; const f=fmtTime(m.tz,d);
    const lblw=Math.max(58, m.name.length*6.4+18);
    const flip = x> W-130; const lx = flip? -lblw-12 : 12;
    pins+=`<g transform="translate(${x},${y})">
      <circle r="6.5" fill="${col}" stroke="#0b1426" stroke-width="2"><title>${esc(m.name)} — ${f.hhmm} ${STATUS_META[st].label}</title></circle>
      <circle r="6.5" fill="${col}" opacity="0.35"><animate attributeName="r" values="6.5;13;6.5" dur="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.35;0;0.35" dur="2.4s" repeatCount="indefinite"/></circle>
      <g transform="translate(${lx},-9)">
        <rect x="0" y="0" width="${lblw}" height="18" rx="5" fill="rgba(8,12,22,.78)" stroke="${col}" stroke-width="1"/>
        <text x="6" y="13" fill="#fff" font-size="11" font-weight="600">${esc(truncate(m.name,12))} ${f.hhmm}</text>
      </g>
    </g>`;
  });
  document.getElementById('pins').innerHTML=pins;
}
function truncate(s,n){return s.length>n?s.slice(0,n-1)+'…':s;}

// "Find zone from current time" — pick an IANA zone whose current offset matches.
document.getElementById('findTzBtn').onclick=()=>{
  const raw=document.getElementById('fCurTime').value.trim();
  const mt=raw.match(/^(\d{1,2}):?(\d{2})?\s*(am|pm)?$/i);
  if(!mt){ toast('Enter time like 15:45 or 3:45pm'); return; }
  let h=+mt[1], mi=mt[2]?+mt[2]:0;
  if(mt[3]){ const pm=/pm/i.test(mt[3]); if(pm&&h<12)h+=12; if(!pm&&h===12)h=0; }
  if(h>23||mi>59){ toast('Invalid time'); return; }
  const now=new Date();
  const utcMin=now.getUTCHours()*60+now.getUTCMinutes();
  let target=h*60+mi-utcMin;            // desired offset minutes
  // normalize to [-720,840]
  while(target<=-720)target+=1440; while(target>840)target-=1440;
  // find closest zone
  let zones=[]; try{zones=Intl.supportedValuesOf('timeZone');}catch(e){zones=Object.keys(CITY);}
  let best=null,bestDiff=1e9;
  for(const z of zones){
    const off=tzOffsetMin(z,now);
    let diff=Math.abs(off-target); diff=Math.min(diff,1440-diff);
    if(diff<bestDiff){bestDiff=diff;best=z;}
    if(diff===0 && CITY[z]){best=z;break;} // prefer a known city on exact match
  }
  if(best){
    document.getElementById('fTz').value=best; updateTzPreview();
    toast(`Matched to ${shortTz(best)} (${fmtOffset(tzOffsetMin(best,now))})`);
  }
};

  if(editingId){
    const m=members.find(x=>x.id===editingId); Object.assign(m,data);

range.addEventListener('input',()=>{ scrubOffsetMin=+range.value; render(); });
document.getElementById('resetScrub').onclick=()=>{ scrubOffsetMin=0; range.value=0; render(); };
document.getElementById('refTz').onchange=e=>{ refTz=e.target.value; localStorage.setItem('teamzone.reftz',refTz); render(); };

// Export / Import
document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(members,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='teamzone-members.json'; a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById('importBtn').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange=e=>{
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{
      const arr=JSON.parse(r.result);
      if(!Array.isArray(arr)) throw 0;
      members=arr.map(m=>({id:m.id||uid(),name:m.name||'Unnamed',role:m.role||'',
        tz:m.tz||'UTC',workStart:m.workStart??9,workEnd:m.workEnd??17,
        days:Array.isArray(m.days)?m.days:[1,2,3,4,5],color:m.color||colorFor(m.name||'x')}));
      save(); render(); toast(`Imported ${members.length} members`);
    }catch(err){ toast('Invalid JSON file'); }
  };
  r.readAsText(file); e.target.value='';
};

let toastTimer;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ============================ Boot & live tick ============================ */
populateStaticInputs();
render();
// live update every 15s (and clears the per-hour offset cache lazily via key)
setInterval(()=>{ if(scrubOffsetMin===0) render(); else { renderMyClock(); } }, 15000);
// also tick the visible clock each second without full re-render churn on heavy views
setInterval(()=>{ if(view==='now' && scrubOffsetMin===0) renderMyClock(); }, 1000);
</script>
</body>
</html>
